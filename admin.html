<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Znüni Admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh;
      background: #fffbf5; gap: 20px;
    }
    h1 { font-size: 22px; font-weight: 900; color: #1e1e2e; }
    .box {
      background: #fff; border: 2px solid #e5e7eb;
      border-radius: 20px; padding: 28px 32px;
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      width: 100%; max-width: 320px;
    }
    input {
      padding: 10px 16px; font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 700;
      border: 2px solid #e5e7eb; border-radius: 50px;
      outline: none; color: #1e1e2e;
    }
    input:focus { border-color: #f97316; }
    button {
      padding: 12px; font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 900; color: #fff;
      background: linear-gradient(135deg, #f97316, #ef4444);
      border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(249,115,22,0.4);
      transition: transform 0.15s ease;
    }
    button:hover { transform: scale(1.03); }
    .msg { font-size: 14px; font-weight: 700; text-align: center; min-height: 20px; }
    .msg.ok { color: #16a34a; }
    .msg.err { color: #ef4444; }
  </style>
</head>
<body>
  <h1>🥐 Znüni Reset</h1>
  <div class="box">
    <input id="secret" type="password" placeholder="Passwort..." />
    <button onclick="doReset()">🔄 Counter zurücksetzen</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    async function doReset() {
      const secret = document.getElementById('secret').value;
      const msg = document.getElementById('msg');
      msg.textContent = '...';
      msg.className = 'msg';
      try {
        const res = await fetch('/api/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ secret })
        });
        if (res.ok) {
          msg.textContent = '✅ Erfolgreich zurückgesetzt!';
          msg.className = 'msg ok';
        } else {
          msg.textContent = '❌ Falsches Passwort';
          msg.className = 'msg err';
        }
      } catch {
        msg.textContent = '❌ Verbindungsfehler';
        msg.className = 'msg err';
      }
    }
    document.getElementById('secret').addEventListener('keydown', e => {
      if (e.key === 'Enter') doReset();
    });
  </script>
</body>
</html>
