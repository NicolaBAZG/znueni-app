<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Znüni 🥐</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 16px;
      min-height: 100vh;
      background: #fffbf5;
      font-family: 'Nunito', sans-serif;
    }

    h1 {
      font-size: 28px;
      font-weight: 900;
      color: #1e1e2e;
      letter-spacing: -0.5px;
    }
    h1 span { color: #f97316; }

    /* ── Button ── */
    .btn-wrapper { position: relative; }

    .znueni-btn {
      position: relative;
      padding: 16px 36px;
      font-family: 'Nunito', sans-serif;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      background: linear-gradient(135deg, #f97316, #ef4444);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(249,115,22,0.45);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      letter-spacing: 0.3px;
      outline: none;
    }
    .znueni-btn::before { content: '🥐'; margin-right: 10px; font-size: 20px; }
    .znueni-btn:hover:not(:disabled) { transform: translateY(-3px) scale(1.04); box-shadow: 0 10px 28px rgba(249,115,22,0.55); }
    .znueni-btn:active:not(:disabled) { transform: translateY(1px) scale(0.98); }
    .znueni-btn:disabled {
      background: linear-gradient(135deg, #9ca3af, #6b7280);
      box-shadow: none; cursor: not-allowed;
    }
    .znueni-btn:disabled::before { content: '😢'; }

    /* ── Popup ── */
    .popup {
      display: none;
      position: absolute;
      bottom: calc(100% + 14px);
      left: 50%;
      transform: translateX(-50%) scale(0.85);
      background: #1e1e2e; color: #f0f0f0;
      padding: 14px 20px; border-radius: 14px;
      font-size: 15px; font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .popup::after {
      content: '';
      position: absolute; top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent;
      border-top-color: #1e1e2e;
    }
    .popup.show { display: block; opacity: 1; transform: translateX(-50%) scale(1); }

    /* ── Confetti ── */
    .confetti-container { position: absolute; top: 50%; left: 50%; pointer-events: none; width: 0; height: 0; }
    .dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; opacity: 0; }
    @keyframes burst {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0.3); opacity: 0; }
    }

    /* ── Counter ── */
    .counter-box {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      background: #fff8f0; border: 2px solid #fed7aa;
      border-radius: 20px; padding: 16px 32px;
      box-shadow: 0 4px 16px rgba(249,115,22,0.12);
    }
    .counter-label { font-size: 13px; font-weight: 700; color: #9a5a1f; text-transform: uppercase; letter-spacing: 1px; }
    .croissants { display: flex; gap: 8px; font-size: 28px; line-height: 1; }
    .croissant { transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), filter 0.3s ease; }
    .croissant.taken { filter: grayscale(1) opacity(0.3); transform: scale(0.85); }
    @keyframes popIn { 0% { transform: scale(1.6); } 60% { transform: scale(0.9); } 100% { transform: scale(0.85); } }
    .croissant.just-taken { animation: popIn 0.4s ease forwards; }
    .counter-text { font-size: 14px; font-weight: 900; color: #f97316; }
    .counter-text.empty { color: #9ca3af; }

    /* ── Name Input ── */
    .name-prompt {
      display: none; flex-direction: column; align-items: center; gap: 10px;
      background: #f0fdf4; border: 2px solid #86efac;
      border-radius: 20px; padding: 16px 28px;
      box-shadow: 0 4px 16px rgba(34,197,94,0.12);
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .name-prompt.active { display: flex; }
    .name-prompt-label { font-size: 14px; font-weight: 700; color: #166534; }
    .name-row { display: flex; gap: 8px; }
    .name-input {
      padding: 10px 16px; font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 700;
      border: 2px solid #86efac; border-radius: 50px;
      outline: none; color: #1e1e2e; transition: border-color 0.2s;
    }
    .name-input:focus { border-color: #22c55e; }
    .name-submit {
      padding: 10px 20px; font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 900;
      color: #fff; background: #22c55e;
      border: none; border-radius: 50px; cursor: pointer;
      transition: transform 0.15s ease, background 0.2s;
    }
    .name-submit:hover { background: #16a34a; transform: scale(1.04); }

    /* ── List ── */
    .list-box {
      width: 100%; max-width: 340px;
      background: #fff; border: 2px solid #e5e7eb;
      border-radius: 20px; padding: 16px 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .list-title { font-size: 13px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; text-align: center; }
    .list-empty { font-size: 14px; color: #9ca3af; font-weight: 700; text-align: center; padding: 8px 0; }
    .list-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 12px;
      background: #fff8f0; margin-bottom: 6px;
      animation: slideDown 0.3s ease;
    }
    .list-item:last-child { margin-bottom: 0; }
    .list-num {
      font-size: 11px; font-weight: 900; color: #f97316;
      background: #fed7aa; border-radius: 50%;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .list-name { font-size: 15px; font-weight: 700; color: #1e1e2e; }
    .list-time { font-size: 11px; color: #9ca3af; margin-left: auto; }

    /* ── Loading ── */
    .loading { font-size: 14px; color: #9ca3af; font-weight: 700; }
  </style>
</head>
<body>

  <h1>Free <span>Znüni</span> 🥐</h1>

  <!-- Button -->
  <div class="btn-wrapper">
    <div class="popup" id="popup"></div>
    <button class="znueni-btn" id="btn" onclick="triggerZnueni()">
      Klick for a free Znüni
    </button>
    <div class="confetti-container" id="confetti"></div>
  </div>

  <!-- Counter -->
  <div class="counter-box">
    <div class="counter-label">Znünis verfügbar</div>
    <div class="croissants">
      <span class="croissant" id="c1">🥐</span>
      <span class="croissant" id="c2">🥐</span>
      <span class="croissant" id="c3">🥐</span>
      <span class="croissant" id="c4">🥐</span>
    </div>
    <div class="counter-text" id="counter-text">Lädt...</div>
  </div>

  <!-- Name Prompt -->
  <div class="name-prompt" id="name-prompt">
    <div class="name-prompt-label">🎉 Du hast ein Znüni bekommen! Wie heisst du?</div>
    <div class="name-row">
      <input class="name-input" id="name-input" type="text" placeholder="Dein Name..." maxlength="30" />
      <button class="name-submit" onclick="submitName()">✓</button>
    </div>
  </div>

  <!-- List -->
  <div class="list-box">
    <div class="list-title">🥐 Znüni-Empfänger</div>
    <div id="list-empty" class="list-empty">Noch niemand... sei der Erste!</div>
    <div id="list-items"></div>
  </div>

<script>
  const MAX = 4;
  const colors = ['#f97316','#ef4444','#facc15','#34d399','#60a5fa','#c084fc'];
  let pendingClaim = false;

  // Load initial state
  async function loadState() {
    try {
      const res = await fetch('/api/state');
      const data = await res.json();
      renderState(data.claimed, data.winners);
    } catch {
      document.getElementById('counter-text').textContent = 'Fehler beim Laden';
    }
  }

  function renderState(claimed, winners) {
    const remaining = MAX - claimed;
    const text = document.getElementById('counter-text');

    for (let i = 1; i <= MAX; i++) {
      const el = document.getElementById('c' + i);
      if (i <= claimed) el.classList.add('taken');
      else el.classList.remove('taken');
    }

    if (remaining === 0) {
      text.textContent = '😢 Alles weg! Nächstes Mal früher kommen!';
      text.classList.add('empty');
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.innerHTML = ' Leider kein Znüni mehr';
    } else {
      text.textContent = `${remaining} von ${MAX} verfügbar`;
      text.classList.remove('empty');
    }

    renderWinners(winners);
  }

  function renderWinners(winners) {
    const emptyMsg = document.getElementById('list-empty');
    const listItems = document.getElementById('list-items');
    listItems.innerHTML = '';
    if (!winners || winners.length === 0) {
      emptyMsg.style.display = '';
      return;
    }
    emptyMsg.style.display = 'none';
    winners.forEach((w, i) => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `
        <span class="list-num">${i + 1}</span>
        <span class="list-name">${escapeHtml(w.name)} 🥐</span>
        <span class="list-time">${w.time || ''}</span>
      `;
      listItems.appendChild(item);
    });
  }

  async function triggerZnueni() {
    if (pendingClaim) return;
    const btn = document.getElementById('btn');

    try {
      const res = await fetch('/api/claim', { method: 'POST' });
      if (res.status === 429) {
        showPopup('⏳ Bitte warte kurz bevor du nochmal versuchst!');
        return;
      }
      if (res.status === 400) {
        showPopup('😢 Leider schon alles weg!');
        return;
      }
      const data = await res.json();

      // Confetti
      shootConfetti();

      // Popup
      const messages = [
        '🎉 Znüni is on its way! Gluschtig! 🥐☕',
        '🥳 Gute Wahl! Ä guete! 🥐',
        '😋 Lecker! Du hast Glück! 🍊☕',
        '🏆 Letztes Znüni! Du bisch schnäll gsi! 🥐'
      ];
      showPopup(messages[Math.min(data.claimed - 1, messages.length - 1)]);

      // Update counter visually
      const el = document.getElementById('c' + data.claimed);
      if (el) { el.classList.add('taken', 'just-taken'); setTimeout(() => el.classList.remove('just-taken'), 400); }

      const remaining = MAX - data.claimed;
      const text = document.getElementById('counter-text');
      if (remaining === 0) {
        text.textContent = '😢 Alles weg! Nächstes Mal früher kommen!';
        text.classList.add('empty');
        btn.disabled = true;
        btn.innerHTML = ' Leider kein Znüni mehr';
      } else {
        text.textContent = `${remaining} von ${MAX} verfügbar`;
        btn.disabled = true; // cooldown
      }

      // Show name input
      pendingClaim = true;
      document.getElementById('name-prompt').classList.add('active');
      setTimeout(() => document.getElementById('name-input').focus(), 100);

      // Re-enable after cooldown (silent)
      setTimeout(() => {
        if (!pendingClaim && remaining > 0) {
          btn.disabled = false;
          btn.innerHTML = '🥐 Klick for a free Znüni';
        }
      }, 30000);

    } catch {
      showPopup('❌ Fehler – bitte nochmal versuchen');
    }
  }

  async function submitName() {
    const input = document.getElementById('name-input');
    const name = input.value.trim() || 'Anonym';
    input.value = '';

    try {
      const res = await fetch('/api/submit-name', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      const data = await res.json();
      renderWinners(data.winners);
    } catch {}

    document.getElementById('name-prompt').classList.remove('active');
    pendingClaim = false;

    // Re-enable button after cooldown ends (if not sold out)
    const remaining = MAX - (document.getElementById('list-items').children.length);
    if (remaining > 0) {
      setTimeout(() => {
        const btn = document.getElementById('btn');
        if (btn.disabled) {
          btn.disabled = false;
          btn.innerHTML = '🥐 Klick for a free Znüni';
        }
      }, 1000);
    }
  }

  function showPopup(msg) {
    const popup = document.getElementById('popup');
    popup.textContent = msg;
    popup.classList.add('show');
    setTimeout(() => popup.classList.remove('show'), 3000);
  }

  function shootConfetti() {
    const confetti = document.getElementById('confetti');
    confetti.innerHTML = '';
    for (let i = 0; i < 18; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      const angle = (360 / 18) * i;
      const dist = 50 + Math.random() * 40;
      const tx = Math.round(Math.cos(angle * Math.PI / 180) * dist) + 'px';
      const ty = Math.round(Math.sin(angle * Math.PI / 180) * dist) + 'px';
      dot.style.cssText = `background:${colors[i%colors.length]};--tx:${tx};--ty:${ty};animation:burst 0.7s ease-out ${i*0.02}s forwards;`;
      confetti.appendChild(dot);
    }
  }

  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitName();
  });

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Poll for live updates every 5 seconds (so other users see changes)
  loadState();
  setInterval(loadState, 5000);
</script>

</body>
</html>
