name: Keep Alive Ping

on:
  schedule:
    - cron: '*/10 * * * *'  # alle 10 Minuten
  workflow_dispatch:         # manuell auslösbar im GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Znüni App
        run: |
          echo "🥐 Pinging znueni-app..."
          curl -f https://znueni-app.onrender.com
          echo "✅ Znüni App is awake!"

      - name: Ping Easter Egg App
        run: |
          echo "🐣 Pinging easter-egg-app..."
          curl -f https://easter-egg-app-0y5x.onrender.com/
          echo "✅ Easter Egg App is awake!"
